<rect x="40" y="538" width="1040" height="48" rx="14" fill="#eef1f5" stroke="#e4e7ec"/>
<text x="560" y="567" text-anchor="middle" class="cap" font-size="14">🏗️ 底層平台與協定：Dify（打造應用）　·　Claude / Codex（模型）　·　MCP（AI 萬用插頭，隨插即用接工具與資料）</text>

<text x="560" y="616" text-anchor="middle" class="sub" font-size="13">讀法：① 大腦會思考　→　② 接上你的私人記憶庫　→　③ 變成會自動做事、又穩又可控的助理（顏色＝三大階段）</text>
