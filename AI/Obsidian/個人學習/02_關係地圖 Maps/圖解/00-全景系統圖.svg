<svg viewBox="0 0 1120 660" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ov dov">
<title id="ov">AI 助理全景系統圖</title>
<desc id="dov">一張圖看懂打造 AI 助理的全部概念，依三大階段歸位：① LLM 會思考（基礎：Prompt、Context、Tool Use、MCP、Skill）；② RAG 有記憶（知識引擎：Hybrid Search、Chunking、Metadata、Data Pipeline）；③ Agent 會行動（自動化與維運：Self-Reflection、Guardrails、Evaluation、Observability、Feedback、Cache、Model Agnostic、Streaming）。底層平台為 Dify、Claude/Codex 與 MCP 協定。</desc>
<style>
text{font-family:'Segoe UI','Noto Sans TC','PingFang TC',sans-serif;}
.h1{font-weight:700;fill:#1f2430;}
