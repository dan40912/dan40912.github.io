<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>FundSwap UX Demo</title>
    <meta name="description" content="FundSwap UX Demo 四個頁面入口。" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/global.css" />
    <style>
      .home-shell {
        min-height: 100vh;
        background: var(--gray-200);
      }

      .site-header {
        grid-template-columns: auto 1fr;
      }

      .site-header nav,
      .header-cta {
        display: none;
      }

      .home-main {
        max-width: 1120px;
        margin: 0 auto;
        padding: clamp(28px, 6vw, 72px) 16px;
      }

      .entry-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
      }

      .entry-card {
        display: flex;
        min-height: 220px;
        flex-direction: column;
        justify-content: space-between;
        border: 1px solid var(--gray-300);
        border-radius: var(--radius);
        background: #fff;
        padding: 24px;
        text-decoration: none;
        transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
      }

      .entry-card:hover,
      .entry-card:focus-visible {
        transform: translateY(-2px);
        border-color: var(--primary-200);
        box-shadow: var(--shadow);
        outline: 0;
      }

      .entry-card h2 {
        margin: 0 0 10px;
        color: var(--gray-900);
        font-size: 24px;
        line-height: 1.28;
      }

      .entry-card p {
        margin: 0;
        color: var(--gray-700);
        line-height: 1.6;
      }

      .entry-card__action {
        display: inline-flex;
        margin-top: 28px;
        color: var(--primary-700);
        font-weight: 800;
      }

      @media (max-width: 1040px) {
        .entry-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 720px) {
        .entry-grid {
          grid-template-columns: 1fr;
        }

        .entry-card {
          min-height: 180px;
        }
      }
    </style>
  </head>
  <body class="portfolio-page home-shell">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="FundSwap UX Demo 首頁">
        <img src="https://www.fundswap.com.tw/wp-content/uploads/2022/07/ic_logo_fav.png" alt="" />
        <span>FundSwap UX Demo</span>
      </a>
      <nav aria-label="Demo 導覽"></nav>
      <a class="header-cta" href="11-find-funds-final.html">開始瀏覽</a>
    </header>

    <main class="home-main">
      <section class="entry-grid" aria-label="Demo 頁面入口">
        <a class="entry-card" href="10-fund-hidden-mentor.html">
          <div>
            <h2>基金藏鏡人</h2>
            <p>用投資人格協助使用者找到適合觀察的基金方向。</p>
          </div>
          <span class="entry-card__action">前往頁面</span>
        </a>

        <a class="entry-card" href="11-find-funds-final.html">
          <div>
            <h2>找基金頁</h2>
            <p>整合搜尋、比較、試算與基金探索流程。</p>
          </div>
          <span class="entry-card__action">前往頁面</span>
        </a>

        <a class="entry-card" href="12-fund-mirror-final.html">
          <div>
            <h2>基金照妖鏡</h2>
            <p>用報酬、波動、基準與熱力圖輔助判斷基金表現。</p>
          </div>
          <span class="entry-card__action">前往頁面</span>
        </a>

        <a class="entry-card" href="10-fund-hidden-mentor.html#chatbot">
          <div>
            <h2>AI 機器人</h2>
            <p>直接進入 Dify 機器人區塊，使用對話詢問基金問題。</p>
          </div>
          <span class="entry-card__action">開啟機器人</span>
        </a>
      </section>
    </main>

    <script src="assets/global.js"></script>
  </body>
</html>
