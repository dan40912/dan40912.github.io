      "opening_statement": "歡迎體驗升級版阿發。\n\n我是你的金融服務 AI 助手，可以協助你處理帳戶登入、信用卡、保單、貸款、投資服務與常見客服問題。我會先判斷服務類型與風險，再用簡短步驟告訴你可以怎麼做；如果情境需要真人協助，也會幫你整理交接摘要。\n\n為了保護你的安全，請不要輸入密碼、OTP、CVV、完整卡號、完整帳號或身分證字號。若你遇到信用卡遺失、疑似盜刷、詐騙簡訊、陌生指示或可疑交易，我會優先引導停用、保留紀錄並轉真人。\n\n這是個人面試 Demo，使用 mock data，不會查詢或送出正式案件。",
