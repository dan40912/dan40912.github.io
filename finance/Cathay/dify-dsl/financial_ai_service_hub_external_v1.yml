      "opening_statement": "您好，我是 Financial AI Service Hub｜對外版，很高興協助您處理金融服務相關問題。\n\n您可以詢問開戶流程、產品資訊、文件上傳、登入與身份驗證、疑似詐騙、不明資金、網站異常，或請我協助整理案件摘要並轉接真人客服。\n\n如果您遇到可疑連結、被要求提供驗證碼、收到不明款項，或系統一直無法完成操作，請直接告訴我發生了什麼事。我會先協助您降低風險，再整理需要補充的資料與下一步。\n\n為了保護您的權益，我不能提供個別投資建議、預測漲跌、承諾收益、揭露第三方個資，或取代正式審核結果。若問題涉及高風險、正式金額、理賠、借款或個人化判斷，我會協助整理案件並建議轉真人。\n\n這是個人面試 Demo，使用 mock data，不會送出正式案件。",
