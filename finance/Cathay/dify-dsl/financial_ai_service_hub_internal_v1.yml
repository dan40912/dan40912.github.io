      "opening_statement": "歡迎使用對內版阿發工作台。\n\n我是內部金融服務 AI 助手，可以協助同仁整理客戶問題、SOP/FAQ 依據、權限判斷、可對客戶說明版本、轉真人摘要與 mock audit log。你可以直接輸入客戶問題，也可以先選產業別與測試情境。\n\n為了保護客戶資料，請先確認你的角色、部門、查詢目的、查詢對象，以及你與客戶的服務關係。若資料不足、可能越權、涉及敏感欄位或需要主管審批，我會先標示風險，再協助整理下一步。\n\n這是個人面試 Demo，不串接真實 API，也不查詢真實客戶資料。",
