      "opening_statement": "您好，我是 Financial AI Service Hub｜對內版，這裡協助內部同仁把客戶查詢、SOP、權限判斷與案件協作整理得更清楚。\n\n您可以把我當成內部 AI Assistant：我能協助業務、客服、理賠、法遵、IT 與主管快速整理問題脈絡，判斷是否符合查詢權限，產出可對客戶說明的安全版本，並建立 mock Case、Approval、Audit Log 與 Teams 通知內容。\n\n為了保護客戶資料，請先告訴我 4 件事：您的角色與部門、查詢目的、查詢對象、您與客戶的服務關係。若資料不足、可能越權、涉及敏感欄位或需要主管審批，我會先提醒風險，再協助整理審批摘要。\n\n這是個人面試 Demo，不串接真實 API，也不查詢真實客戶資料。",
