<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Call Center 真人介入工作台</title>
  <style>
    :root {
      --ink: #14211b;
      --muted: #5f7168;
      --line: #d4e5dc;
      --bg: #f3faf6;
      --surface: #fff;
      --green: #247a51;
      --green-dark: #165b3a;
      --green-soft: #e4f5eb;
      --warning: #2f7f68;
      --warning-soft: #e7f5ef;
      --danger: #8f4f4b;
      --danger-soft: #f7ece9;
      --shadow: 0 18px 42px rgba(29, 78, 53, .12);
      --radius: 8px;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; margin: 0; }
    body {
      font-family: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 8%, rgba(36,122,81,.14), transparent 30rem),
        radial-gradient(circle at 84% 0%, rgba(37,108,147,.08), transparent 24rem),
        linear-gradient(180deg, #fbfefc 0%, var(--bg) 100%);
    }
    button, textarea, input { font: inherit; }
    button { cursor: pointer; }
    a { color: inherit; text-decoration: none; }
    h1, h2, h3, p { margin: 0; }
    button:focus-visible, a:focus-visible, textarea:focus-visible, input:focus-visible {
      outline: 3px solid rgba(36,122,81,.24);
      outline-offset: 3px;
    }

    .topbar {
      min-height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 0 30px;
      border-bottom: 1px solid rgba(36,122,81,.16);
      background: rgba(251,254,252,.9);
      backdrop-filter: blur(14px);
      box-shadow: 0 10px 28px rgba(29,78,53,.06);
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      color: #fff;
      background: var(--green);
      font-size: 13px;
      font-weight: 950;
    }
    .brand strong { display: block; font-size: 18px; }
    .brand span { display: block; margin-top: 3px; color: var(--muted); font-size: 12px; }
    .top-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .chip {
      display: inline-flex;
      min-height: 30px;
      align-items: center;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: #235b40;
      background: #fff;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }
    .chip.danger { color: #6d3430; background: var(--danger-soft); border-color: rgba(143,79,75,.35); }
    .chip.warn { color: #245947; background: var(--warning-soft); border-color: rgba(47,127,104,.35); }

    .page {
      width: min(1500px, 100%);
      margin: 0 auto;
      padding: 22px;
    }
    .console-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      margin-bottom: 16px;
    }
    .console-head h1 { font-size: clamp(28px, 3vw, 42px); line-height: 1.12; }
    .console-head p { margin-top: 8px; color: var(--muted); line-height: 1.65; }
    .metrics { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; }

    .workspace {
      display: grid;
      grid-template-columns: 310px minmax(0, 1fr) 390px;
      gap: 16px;
      align-items: start;
    }
    .panel, .ticket-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,.94);
      box-shadow: var(--shadow);
    }
    .panel { overflow: hidden; }
    .panel-body { padding: 16px; }
    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .panel-title h2 { font-size: 19px; }
    .panel-title p { color: var(--muted); font-size: 13px; line-height: 1.5; }

    .queue-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .tab-btn, .btn {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: #254739;
      background: #fff;
      font-weight: 900;
      transition: transform .16s ease, background .16s ease, border-color .16s ease, box-shadow .16s ease;
    }
    .tab-btn:hover, .tab-btn.active, .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(36,122,81,.45);
      background: #f4fbf7;
      box-shadow: 0 8px 18px rgba(29,78,53,.10);
    }
    .tab-btn.active, .btn.primary { color: #fff; border-color: var(--green); background: var(--green); }
    .btn.primary:hover { background: var(--green-dark); }
    .btn.warning { color: #245947; border-color: var(--warning); background: var(--warning-soft); }
    .btn.danger { color: #fff; border-color: var(--danger); background: var(--danger); }
    .btn.full { width: 100%; }
    .btn:disabled { cursor: not-allowed; opacity: .52; transform: none; box-shadow: none; }

    .ticket-list { display: grid; gap: 10px; }
    .ticket-card {
      position: relative;
      display: grid;
      gap: 8px;
      padding: 12px;
      text-align: left;
    }
    .ticket-card.active {
      border-color: rgba(36,122,81,.55);
      box-shadow: 0 18px 44px rgba(29,78,53,.15);
    }
    .ticket-card.active::before {
      content: "";
      position: absolute;
      left: 0;
      top: 12px;
      bottom: 12px;
      width: 4px;
      border-radius: 999px;
      background: var(--green);
    }
    .ticket-top { display: flex; justify-content: space-between; gap: 8px; align-items: center; }
    .ticket-card strong { font-size: 15px; }
    .ticket-card p {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .case-hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 190px;
      gap: 14px;
      padding: 16px;
      border-bottom: 1px solid var(--line);
      border-left: 4px solid var(--green);
      background: #fbfefc;
    }
    .case-hero h2 { font-size: 26px; line-height: 1.25; }
    .case-hero p { margin-top: 8px; color: var(--muted); line-height: 1.65; }
    .case-photo {
      min-height: 160px;
      border-radius: var(--radius);
      background-image: linear-gradient(180deg, rgba(36,122,81,.02), rgba(36,122,81,.20)), url("../../assets/external-card-support.png");
      background-size: cover;
      background-position: center;
    }
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-top: 14px;
    }
    .meta-item {
      min-height: 70px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }
    .meta-item span { color: var(--muted); font-size: 12px; font-weight: 900; }
    .meta-item strong { display: block; margin-top: 5px; font-size: 15px; }

    .case-steps {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }
    .case-step {
      min-height: 58px;
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #f8fcfa;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      line-height: 1.35;
    }
    .case-step span {
      display: block;
      margin-bottom: 4px;
      color: #235b40;
      font-size: 11px;
    }
    .case-step.active {
      border-color: var(--green);
      color: #fff;
      background: var(--green);
      box-shadow: 0 8px 18px rgba(29,78,53,.12);
    }
    .case-step.active span { color: #dff3e8; }
    .case-step.done {
      border-color: rgba(36,122,81,.35);
      color: #235b40;
      background: var(--green-soft);
    }

    .conversation {
      display: grid;
      gap: 10px;
      max-height: 280px;
      overflow: auto;
      padding: 14px;
      border-bottom: 1px solid var(--line);
      background: #f8fcfa;
    }
    .message {
      max-width: 90%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      font-size: 14px;
      line-height: 1.65;
    }
    .message.agent { margin-left: auto; color: #fff; border-color: var(--green); background: var(--green); }
    .message.system { max-width: 100%; color: #245947; background: var(--warning-soft); border-color: rgba(47,127,104,.35); }

    textarea, input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--ink);
      background: #fff;
      outline: none;
      line-height: 1.6;
    }
    textarea {
      min-height: 118px;
      padding: 12px;
      resize: vertical;
    }
    input { min-height: 38px; padding: 8px 10px; }
    textarea:focus, input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 4px rgba(36,122,81,.12);
      outline: none;
    }
    .editor-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 16px;
    }
    .field label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
    }
    .action-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      padding: 0 16px 16px;
    }

    .info-list, .audit-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .info-list li, .audit-item, .permission-row {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #f8fcfa;
      font-size: 13px;
      line-height: 1.55;
    }
    .info-list span { display: block; color: var(--muted); font-size: 12px; font-weight: 900; }
    .info-list strong { display: block; margin-top: 3px; }
    .permission-row { display: grid; grid-template-columns: 92px 1fr; gap: 10px; }
    .permission-row strong { color: var(--green-dark); }
    .audit-item time { display: block; color: var(--muted); font-size: 12px; margin-bottom: 4px; }

    .kb-card {
      display: grid;
      gap: 8px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #f8fcfa;
    }
    .kb-card h3 { font-size: 16px; }
    .kb-card p { color: var(--muted); font-size: 13px; line-height: 1.6; }
    .kb-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      max-width: 380px;
      padding: 13px 16px;
      border-radius: var(--radius);
      color: #fff;
      background: #102018;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
      z-index: 20;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: .01ms !important;
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }

    @media (max-width: 1180px) {
      .workspace { grid-template-columns: 1fr; }
      .meta-grid, .editor-grid, .action-grid, .case-steps { grid-template-columns: 1fr; }
      .case-hero { grid-template-columns: 1fr; }
    }
    @media (max-width: 760px) {
      .topbar, .console-head { align-items: flex-start; flex-direction: column; padding: 14px; }
      .page { padding: 16px 12px 28px; }
      .metrics { justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="../index.html" aria-label="返回對內工作台">
      <div class="mark">CC</div>
      <div>
        <strong>Call Center 工作台</strong>
        <span>接手、批准、回覆、留痕</span>
      </div>
    </a>
    <div class="top-actions">
      <span class="chip">Jay Wu</span>
      <span class="chip">主管 / 知識審核</span>
      <a class="chip" href="../../external/index.html">對外頁</a>
    </div>
  </header>

  <main class="page">
    <section class="console-head">
      <div>
        <h1>真人接手與批准</h1>
      </div>
      <div class="metrics">
        <span class="chip danger" id="highRiskMetric">高風險 2</span>
        <span class="chip warn" id="approvalMetric">待批准 2</span>
        <span class="chip" id="slaMetric">SLA 平均 09:14</span>
      </div>
    </section>

    <section class="workspace">
      <aside class="panel">
        <div class="panel-body">
          <div class="panel-title">
            <div>
              <h2>待處理</h2>
            </div>

          <div class="ticket-list" id="ticketList"></div>
        </div>
      </aside>

      <section class="panel">
        <div class="case-hero">
          <div>
            <div class="ticket-top">
              <span class="chip" id="caseId">CASE-</span>
              <span class="chip danger" id="caseRisk">高風險</span>

            <div class="meta-grid">
              <div class="meta-item"><span>狀態</span><strong id="caseStatus" aria-live="polite">待接手</strong></div>
              <div class="meta-item"><span>接手人</span><strong id="caseAssignee">尚未接手</strong></div>
              <div class="meta-item"><span>批准</span><strong id="caseApproval">未送出</strong></div>
              <div class="meta-item"><span>SLA</span><strong id="caseSla">剩餘 08:32</strong></div>
            </div>
          </div>
          <div class="case-photo" aria-hidden="true"></div>
        </div>

        <div class="case-steps" id="caseSteps" aria-label="案件處理流程"></div>

        <div class="conversation" id="conversation"></div>

        <div class="editor-grid">
          <div class="field">
            <label for="humanReply">客戶回覆</label>
            <textarea id="humanReply"></textarea>
          </div>
          <div class="field">
            <label for="internalNote">處理備註</label>
            <textarea id="internalNote"></textarea>
          </div>
        </div>
        <div class="action-grid">
          <button class="btn primary" id="assignBtn" type="button" title="接手後會記錄 Jay Wu 與處理時間">接手</button>
          <button class="btn warning" id="submitApprovalBtn" type="button" title="高風險、投資、理賠、貸款邊界案件需先送主管批准">送批准</button>
          <button class="btn primary" id="approveBtn" type="button" title="批准後才可回覆高風險案件或發布知識庫候選">批准</button>
          <button class="btn" id="rejectBtn" type="button" title="資料不足時退回補充身份驗證、客戶同意或風險說明">退回補充</button>
          <button class="btn primary" id="replyBtn" type="button" title="高風險案件未批准前不可回覆客戶">回覆</button>
          <button class="btn" id="closeBtn" type="button" title="完成回覆與紀錄後結案">結案</button>
        </div>
      </section>

      <aside class="panel">
        <div class="panel-body">
          <div class="panel-title">
            <h2>案件</h2>
            <span class="chip" id="caseLine">credit_card</span>
          </div>
          <ul class="info-list" id="caseInfo"></ul>
        </div>
        <div class="panel-body">
          <div class="panel-title">
            <h2>處理規則</h2>
          </div>
          <div id="permissionMatrix"></div>
        </div>
        <div class="panel-body">
          <div class="panel-title">
            <h2>知識候選</h2>
            <span class="chip" id="kbStatus">草稿</span>
          </div>
          <div class="kb-card">
            <h3 id="kbQuestion">疑似盜刷第一線怎麼回？</h3>
            <p id="kbAnswer">先停損，不索取敏感資訊，轉專人處理。</p>
            <div class="kb-actions">
              <button class="btn" id="kbDraftBtn" type="button" title="只建立草稿，不會寫入正式 FAQ">候選</button>
              <button class="btn warning" id="kbReviewBtn" type="button" title="送知識庫管理者審核，確認不可承諾與敏感資料邊界">送審</button>
              <button class="btn primary" id="kbPublishBtn" type="button" title="需主管批准後才能發布，避免錯誤知識進入正式 FAQ">發布</button>
            </div>
          </div>
        </div>
        <div class="panel-body">
          <div class="panel-title">
            <h2>稽核紀錄</h2>
          </div>
          <div class="audit-list" id="auditLog"></div>
        </div>
      </aside>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite">已更新</div>

          status: "draft"
        },
        messages: ["客戶：昨天買美股，為什麼今天還沒看到？", "AI：複委託交割會依市場與假日不同。"],
        audit_logs: [{ time: "09:18", text: "Jay Wu 接手案件" }]
      },
      {
        case_id: "CASE-20260517-0902",
        title: "疑似詐騙轉帳",
        source: "external_call_center",
        business_line: "banking",
        risk_level: "high",
        status: "pending_approval",
        sla: "剩餘 04:51",
        customer_name: "林先生",
        assigned_to: "Jay Wu",
        approval_status: "pending",
        required_permission: "supervisor_approval",
        customer_summary: "客戶被要求操作 ATM 解除分期，需立即停止並轉安全流程。",
        ai_suggested_reply: "請先不要再操作 ATM，也不要提供驗證碼或帳戶資料。這很可能是詐騙，我會協助您轉接專人。",
        human_reply: "林先生，請先不要再操作 ATM，也不要提供驗證碼或帳戶資料。我會立即協助您轉接安全專人。",
        internal_note: "待主管批准後回覆。",
        kb_candidate: {
          question: "客戶正在被要求操作 ATM 怎麼辦？",
          answer: "先停止操作，不提供驗證碼或帳戶資料，保留紀錄並轉接安全專人。",
          status: "reviewing"
        },
        messages: ["客戶：對方叫我去 ATM 解除分期。", "AI：請先停止操作，這可能是詐騙。"],
        audit_logs: [{ time: "09:23", text: "Jay Wu 送出主管批准" }]
      }
    ];

    const state = { selectedId: cases[0].case_id, queue: "all" };
    const queueTabs = document.getElementById("queueTabs");
    const ticketList = document.getElementById("ticketList");
    const conversation = document.getElementById("conversation");
    const humanReply = document.getElementById("humanReply");
    const internalNote = document.getElementById("internalNote");
    const toast = document.getElementById("toast");

    function selectedCase() {
      return cases.find(item => item.case_id === state.selectedId) || cases[0];
    }
    function riskChipClass(risk) {
      if (risk === "high") return "chip danger";
      if (risk === "warn") return "chip warn";
      return "chip";
    }
    function addAudit(item, text) {
      const time = new Date().toLocaleTimeString("zh-TW", { hour: "2-digit", minute: "2-digit" });
      item.audit_logs.unshift({ time, text });
    }
    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 2200);
    }

    function renderQueue() {
      queueTabs.innerHTML = queueFilters.map(filter => `<button class="tab-btn ${state.queue === filter.id ? "active" : ""}" type="button" data-queue="${filter.id}">${filter.label}</button>`).join("");
      queueTabs.querySelectorAll(".tab-btn").forEach(button => {
        button.addEventListener("click", () => {
          state.queue = button.dataset.queue;
          renderAll();
        });
      });

      const visible = state.queue === "all" ? cases : cases.filter(item => item.status === state.queue);
      ticketList.innerHTML = visible.map(item => `
        <button class="ticket-card ${state.selectedId === item.case_id ? "active" : ""}" type="button" data-case="${item.case_id}">
          <div class="ticket-top">
            <strong>${item.case_id}</strong>
            <span class="${riskChipClass(item.risk_level)}">${riskLabels[item.risk_level]}</span>
          </div>
          <p>${item.title}</p>
          <div class="ticket-top">
            <span class="chip">${statusLabels[item.status]}</span>
            <span class="chip">${item.sla}</span>
          </div>
        </button>
      `).join("");
      ticketList.querySelectorAll(".ticket-card").forEach(card => {
        card.addEventListener("click", () => {
          state.selectedId = card.dataset.case;
          renderAll();
        });
      });
    }

    function renderCase() {
      const item = selectedCase();
      document.getElementById("caseId").textContent = item.case_id;
      document.getElementById("caseRisk").textContent = riskLabels[item.risk_level];
      document.getElementById("caseRisk").className = riskChipClass(item.risk_level);
      document.getElementById("caseTitle").textContent = item.title;
      document.getElementById("caseSummary").textContent = item.customer_summary;
      document.getElementById("caseStatus").textContent = statusLabels[item.status];
      document.getElementById("caseAssignee").textContent = item.assigned_to || "尚未接手";
      document.getElementById("caseApproval").textContent = approvalLabels[item.approval_status];
      document.getElementById("caseSla").textContent = item.sla;
      renderCaseSteps(item);
      humanReply.value = item.human_reply;
      internalNote.value = item.internal_note;
      conversation.innerHTML = item.messages.map((message, index) => `<div class="message ${index % 2 ? "agent" : ""}">${message}</div>`).join("") + `<div class="message system">AI 建議：${item.ai_suggested_reply}</div>`;

      document.getElementById("caseLine").textContent = item.business_line;
      document.getElementById("caseInfo").innerHTML = `
        <li><span>客戶</span><strong>${item.customer_name}</strong></li>
        <li><span>來源</span><strong>${item.source}</strong></li>
        <li><span>所需權限</span><strong>${item.required_permission}</strong></li>
        <li><span>內部備註</span><strong>${item.internal_note || "尚未填寫"}</strong></li>
      `;
      document.getElementById("permissionMatrix").innerHTML = permissions.map(row => `<div class="permission-row"><strong>${row[0]}</strong><span>${row[1]}</span></div>`).join("");
      document.getElementById("kbStatus").textContent = item.kb_candidate.status === "draft" ? "草稿" : item.kb_candidate.status === "reviewing" ? "審核中" : "已發布";
      document.getElementById("kbQuestion").textContent = item.kb_candidate.question;
      document.getElementById("kbAnswer").textContent = item.kb_candidate.answer;
      document.getElementById("auditLog").innerHTML = item.audit_logs.length ? item.audit_logs.map(log => `<div class="audit-item"><time>${log.time}</time>${log.text}</div>`).join("") : `<div class="audit-item">尚無稽核紀錄</div>`;

      const isClosed = item.status === "closed";
      document.getElementById("assignBtn").disabled = isClosed || Boolean(item.assigned_to);
      document.getElementById("submitApprovalBtn").disabled = isClosed || item.status !== "in_progress" || item.approval_status === "pending" || item.approval_status === "approved";
      document.getElementById("approveBtn").disabled = item.approval_status !== "pending";
      document.getElementById("rejectBtn").disabled = item.approval_status !== "pending";
      document.getElementById("replyBtn").disabled = isClosed || (item.risk_level === "high" && item.approval_status !== "approved");
      document.getElementById("closeBtn").disabled = item.status !== "customer_replied";
      document.getElementById("kbReviewBtn").disabled = isClosed || item.kb_candidate.status !== "draft";
      document.getElementById("kbPublishBtn").disabled = item.approval_status !== "approved" || item.kb_candidate.status !== "reviewing";
    }

    function currentStepIndex(item) {
      if (item.status === "closed") return 5;
      if (item.status === "customer_replied") return 4;
      if (item.approval_status === "approved" || item.status === "approved") return 3;
      if (item.approval_status === "pending" || item.status === "pending_approval") return 2;
      if (item.assigned_to) return 1;
      return 0;
    }

    function renderCaseSteps(item) {
      const activeIndex = currentStepIndex(item);
      document.getElementById("caseSteps").innerHTML = caseSteps.map((step, index) => {
        const stateClass = index < activeIndex ? "done" : index === activeIndex ? "active" : "";
        return `<div class="case-step ${stateClass}"><span>${index + 1}</span>${step.label}</div>`;
      }).join("");
    }

    function renderMetrics() {
      document.getElementById("highRiskMetric").textContent = `高風險 ${cases.filter(item => item.risk_level === "high").length}`;
      document.getElementById("approvalMetric").textContent = `待批准 ${cases.filter(item => item.approval_status === "pending").length}`;
      document.getElementById("slaMetric").textContent = `處理中 ${cases.filter(item => item.status !== "closed").length}`;
    }
    function renderAll() {
      renderQueue();
      renderCase();
      renderMetrics();
    }

    function persistText() {
      const item = selectedCase();
      item.human_reply = humanReply.value.trim();
      item.internal_note = internalNote.value.trim();
    }
    document.getElementById("assignBtn").addEventListener("click", () => {
      const item = selectedCase();
      if (item.status === "closed") {
        showToast("已結案案件不可再接手");
        return;
      }
      if (item.assigned_to) {
        showToast(`此案件已由 ${item.assigned_to} 接手`);
        return;
      }
      item.assigned_to = "Jay Wu";
      item.status = "in_progress";
      addAudit(item, "Jay Wu 接手案件");
      renderAll();
      showToast("已接手案件");
    });
    document.getElementById("submitApprovalBtn").addEventListener("click", () => {
      const item = selectedCase();
      if (item.status === "closed" || item.approval_status === "approved") {
        showToast("此案件目前不需送出批准");
        return;
      }
      if (item.status !== "in_progress") {
        showToast("需先接手案件，才能送出批准");
        return;
      }
      persistText();
      item.approval_status = "pending";
      item.status = "pending_approval";
      addAudit(item, "Jay Wu 送出主管批准");
      renderAll();
      showToast("已送出主管批准");
    });
    document.getElementById("approveBtn").addEventListener("click", () => {
      const item = selectedCase();
      if (item.approval_status !== "pending") {
        showToast("需先送出批准，主管才能核准");
        return;
      }
      item.approval_status = "approved";
      item.status = "approved";
      addAudit(item, "主管批准高風險回覆");
      renderAll();
      showToast("主管已批准");
    });
    document.getElementById("rejectBtn").addEventListener("click", () => {
      const item = selectedCase();
      if (item.approval_status !== "pending") {
        showToast("沒有待批准項目可退回");
        return;
      }
      item.approval_status = "rejected";
      item.status = "in_progress";
      addAudit(item, "主管退回補充：請補明身份驗證與客戶同意紀錄");
      renderAll();
      showToast("已退回補充");
    });
    document.getElementById("replyBtn").addEventListener("click", () => {
      const item = selectedCase();
      persistText();
      if (item.risk_level === "high" && item.approval_status !== "approved") {
        showToast("高風險案件需主管批准後才能回覆客戶");
        return;
      }
      item.status = "customer_replied";
      item.messages.push(`真人客服：${item.human_reply}`);
      addAudit(item, "Jay Wu 回覆客戶");
      renderAll();
      showToast("已回覆客戶");
    });
    document.getElementById("closeBtn").addEventListener("click", () => {
      const item = selectedCase();
      if (item.status !== "customer_replied") {
        showToast("需先回覆客戶並留下紀錄後才能結案");
        return;
      }
      item.status = "closed";
      addAudit(item, "Jay Wu 結案");
      renderAll();
      showToast("案件已結案");
    });
    document.getElementById("kbDraftBtn").addEventListener("click", () => {
      const item = selectedCase();
      item.kb_candidate.status = "draft";
      addAudit(item, `新增候選知識：${item.kb_candidate.question}`);
      renderAll();
      showToast("已加入候選知識草稿");
    });
    document.getElementById("kbReviewBtn").addEventListener("click", () => {
      const item = selectedCase();
      if (item.kb_candidate.status !== "draft") {
        showToast("此候選知識已送審或已發布");
        return;
      }
      item.kb_candidate.status = "reviewing";
      addAudit(item, "候選知識送審");
      renderAll();
      showToast("知識庫候選已送審");
    });
    document.getElementById("kbPublishBtn").addEventListener("click", () => {
      const item = selectedCase();
      if (item.approval_status !== "approved") {
        showToast("需主管批准後才能發布知識庫");
        return;
      }
      if (item.kb_candidate.status !== "reviewing") {
        showToast("需先送審知識庫候選");
        return;
      }
      item.kb_candidate.status = "published";
      addAudit(item, "發布候選知識到知識庫");
      renderAll();
      showToast("知識庫候選已發布");
    });
    humanReply.addEventListener("input", persistText);
    internalNote.addEventListener("input", persistText);
    renderAll();
  </script>
</body>
</html>
