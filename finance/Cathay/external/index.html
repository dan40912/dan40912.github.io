<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>對外服務工作台</title>
  <style>
    :root {
      --ink: #14211b;
      --muted: #5f7168;
      --line: #d4e5dc;
      --bg: #f3faf6;
      --surface: #fff;
      --green: #247a51;
      --green-dark: #165b3a;
      --green-soft: #e4f5eb;
      --warning: #2f7f68;
      --warning-soft: #e7f5ef;
      --danger: #8f4f4b;
      --danger-soft: #f7ece9;
      --shadow: 0 22px 58px rgba(29, 78, 53, .13);
      --shadow-soft: 0 10px 26px rgba(29, 78, 53, .08);
      --radius: 8px;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; margin: 0; }
    body {
      font-family: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 8%, rgba(36,122,81,.14), transparent 30rem),
        radial-gradient(circle at 84% 0%, rgba(37,108,147,.09), transparent 24rem),
        linear-gradient(180deg, #fbfefc 0%, var(--bg) 100%);
    }
    button, textarea { font: inherit; }
    button { cursor: pointer; }
    a { color: inherit; text-decoration: none; }
    button:focus-visible, a:focus-visible, .service-card:focus-visible, textarea:focus-visible {
      outline: 3px solid rgba(36,122,81,.24);
      outline-offset: 3px;
    }

    .topbar {
      min-height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 0 30px;
      border-bottom: 1px solid rgba(36,122,81,.16);
      background: rgba(251,254,252,.88);
      backdrop-filter: blur(14px);
      box-shadow: 0 10px 28px rgba(29,78,53,.06);
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      color: #fff;
      background: var(--green);
      font-size: 13px;
      font-weight: 950;
    }
    .brand strong { display: block; font-size: 18px; }
    .brand span { display: block; margin-top: 3px; color: var(--muted); font-size: 12px; }
    .top-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .chip {
      display: inline-flex;
      min-height: 30px;
      align-items: center;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: #235b40;
      background: #fff;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .page {
      width: min(1380px, 100%);
      margin: 0 auto;
      padding: 28px;
    }
    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 20px;
      margin-bottom: 20px;
    }
    .panel, .service-card, .hero-copy {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,.92);
      box-shadow: var(--shadow);
    }
    .hero-copy {
      min-height: 280px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 34px;
    }
    .hero-copy::after {
      content: "";
      position: absolute;
      right: -86px;
      bottom: -86px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: rgba(36,122,81,.10);
      pointer-events: none;
    }
    .hero-copy > * { position: relative; z-index: 1; }
    h1, h2, h3, p { margin: 0; }
    h1 {
      max-width: 820px;
      font-size: clamp(36px, 4.4vw, 58px);
      line-height: 1.06;
      letter-spacing: 0;
    }
    .hero-copy p {
      max-width: 760px;
      margin-top: 16px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.75;
    }
    .status-panel {
      display: grid;
      gap: 12px;
      padding: 18px;
    }
    .status-item {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #f8fcfa;
    }
    .status-item strong { display: block; font-size: 20px; }
    .status-item span { display: block; margin-top: 5px; color: var(--muted); font-size: 12px; line-height: 1.5; }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 390px;
      gap: 20px;
      align-items: start;
    }
    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
    }
    .section-head h2 { font-size: 24px; }
    .section-head p { margin-top: 6px; color: var(--muted); line-height: 1.6; }
    .service-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    .service-card {
      overflow: hidden;
      min-height: 330px;
      display: grid;
      grid-template-rows: 168px 1fr;
      text-align: left;
      transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease, background .16s ease;
    }
    .service-card:hover, .service-card.active {
      transform: translateY(-2px);
      border-color: rgba(36,122,81,.45);
      background: #fbfefc;
      box-shadow: 0 24px 54px rgba(29,78,53,.16);
    }
    .service-visual {
      background-position: center;
      background-size: cover;
      transform: scale(1.01);
      transition: transform .28s ease;
    }
    .service-card:hover .service-visual { transform: scale(1.045); }
    .service-card.active .service-icon {
      color: #fff;
      background: var(--green);
    }
    .service-card[data-service="banking"] .service-visual { background-image: linear-gradient(180deg, rgba(36,122,81,.02), rgba(36,122,81,.20)), url("../assets/external-banking-support.png"); }
    .service-card[data-service="securities"] .service-visual { background-image: linear-gradient(180deg, rgba(36,122,81,.02), rgba(36,122,81,.20)), url("../assets/external-securities-support.png"); }
    .service-card[data-service="insurance"] .service-visual { background-image: linear-gradient(180deg, rgba(36,122,81,.02), rgba(36,122,81,.20)), url("../assets/external-insurance-support.png"); }
    .service-card[data-service="card"] .service-visual { background-image: linear-gradient(180deg, rgba(36,122,81,.02), rgba(36,122,81,.20)), url("../assets/external-card-support.png"); }
    .service-card[data-service="loan"] .service-visual { background-image: linear-gradient(180deg, rgba(36,122,81,.02), rgba(36,122,81,.20)), url("../assets/external-loan-support.png"); }
    .service-card[data-service="fraud"] .service-visual { background-image: linear-gradient(180deg, rgba(36,122,81,.02), rgba(36,122,81,.20)), url("../assets/external-fraud-support.png"); }
    .service-body {
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
      padding: 16px;
    }
    .service-card h3 { font-size: 19px; line-height: 1.3; }
    .service-card p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .service-icon {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      color: var(--green);
      background: var(--green-soft);
      font-size: 12px;
      font-weight: 950;
    }
    .badge {
      display: inline-flex;
      min-height: 26px;
      align-items: center;
      width: fit-content;
      padding: 0 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 950;
      color: #235b40;
      background: var(--green-soft);
    }
    .badge.warn { color: #245947; background: var(--warning-soft); }
    .badge.danger { color: #6d3430; background: var(--danger-soft); }
    .btn {
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: #254739;
      background: #fff;
      font-weight: 900;
      transition: transform .16s ease, background .16s ease, border-color .16s ease, box-shadow .16s ease;
    }
    .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(36,122,81,.45);
      background: #f4fbf7;
      box-shadow: 0 8px 18px rgba(29,78,53,.10);
    }
    .btn.primary { border-color: var(--green); color: #fff; background: var(--green); }
    .btn.primary:hover { background: var(--green-dark); }
    .btn.warning { border-color: var(--warning); color: #245947; background: var(--warning-soft); }
    .btn.full { width: 100%; }
    .faq-link {
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: #235b40;
      background: #fff;
      font-size: 13px;
      font-weight: 900;
      transition: transform .16s ease, background .16s ease, border-color .16s ease, box-shadow .16s ease;
    }
    .faq-link:hover {
      transform: translateY(-1px);
      border-color: rgba(36,122,81,.45);
      background: #f4fbf7;
      box-shadow: 0 8px 18px rgba(29,78,53,.10);
    }

    .side {
      position: sticky;
      top: 88px;
      display: grid;
      gap: 14px;
    }
    .chatbot-panel-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .chatbot-close {
      width: 34px;
      height: 34px;
      flex: 0 0 auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: #254739;
      background: #fff;
      font-size: 20px;
      font-weight: 900;
      line-height: 1;
    }
    .chatbot-dock {
      position: fixed;
      top: 20px;
      right: 20px;
      bottom: 20px;
      width: min(430px, calc(100vw - 40px));
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      z-index: 60;
      box-shadow: 0 28px 70px rgba(16,32,24,.24);
    }
    .chatbot-dock .chat-frame {
      height: auto;
      min-height: 0;
    }
    .chatbot-dock .chat-frame iframe {
      min-height: 0 !important;
    }
    .panel { overflow: hidden; }
    .panel-body { padding: 18px; }
    .panel-body h2 { font-size: 21px; line-height: 1.3; }
    .panel-body p { margin-top: 8px; color: var(--muted); line-height: 1.65; }
    textarea {
      width: 100%;
      min-height: 126px;
      margin-top: 14px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--ink);
      background: #fff;
      resize: vertical;
      outline: none;
      line-height: 1.6;
    }
    .field-label {
      display: block;
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
    }
    textarea:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 4px rgba(36,122,81,.12);
      outline: none;
    }
    .preset-group {
      display: grid;
      gap: 8px;
      margin-top: 14px;
    }
    .preset-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
    }
    .preset-options {
      display: grid;
      gap: 8px;
    }
    .preset-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 72px;
      gap: 8px;
    }
    .preset-option, .preset-copy {
      width: 100%;
      min-height: 44px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: #254739;
      background: #fff;
      text-align: left;
      font-size: 13px;
      font-weight: 850;
      line-height: 1.5;
      transition: transform .16s ease, background .16s ease, border-color .16s ease, box-shadow .16s ease;
    }
    .preset-option:hover, .preset-option.active, .preset-copy:hover {
      transform: translateY(-1px);
      border-color: rgba(36,122,81,.45);
      background: #f4fbf7;
      box-shadow: 0 8px 18px rgba(29,78,53,.10);
    }
    .preset-option.active {
      color: #fff;
      background: var(--green);
      border-color: var(--green);
    }
    .preset-copy {
      text-align: center;
      color: var(--green);
      background: var(--green-soft);
      white-space: nowrap;
    }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
    .mock-profile-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }
    .mock-profile-item {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #f8fcfa;
      font-size: 13px;
      line-height: 1.5;
    }
    .mock-profile-item strong { display: block; color: var(--green-dark); }
    .mock-profile-item span { display: block; margin-top: 3px; color: var(--muted); }
    .chat-log {
      max-height: min(42vh, 360px);
      overflow: auto;
      padding: 14px;
      border-top: 1px solid var(--line);
      background: #f8fcfa;
    }
    .message {
      max-width: 92%;
      margin-bottom: 10px;
      padding: 10px 12px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.6;
      background: #fff;
      border: 1px solid var(--line);
    }
    .message.agent { margin-left: auto; color: #fff; background: var(--green); border-color: var(--green); }
    .handoff-status {
      display: grid;
      gap: 10px;
      padding: 14px;
      border-top: 1px solid var(--line);
      border-left: 4px solid var(--green);
      background: #fbfefc;
    }
    .handoff-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .handoff-item {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }
    .handoff-item span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }
    .handoff-item strong {
      display: block;
      margin-top: 5px;
      font-size: 14px;
    }
    .handoff-note {
      min-height: 86px;
      margin-top: 0;
    }
    .handoff-actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .chat-frame {
      height: 520px;
      border-top: 1px solid var(--line);
      background: #f8fcfa;
    }
    .chat-frame iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
    .floating-actions {
      position: fixed;
      right: 20px;
      bottom: 88px;
      display: grid;
      grid-template-columns: auto auto;
      gap: 10px;
      z-index: 25;
    }
    .floating-chatbot {
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 18px;
      border: 1px solid var(--green);
      border-radius: var(--radius);
      color: #fff;
      background: var(--green);
      box-shadow: var(--shadow);
      font-weight: 950;
    }
    .floating-chatbot:hover {
      background: var(--green-dark);
      transform: translateY(-1px);
    }
    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      max-width: 360px;
      padding: 13px 16px;
      border-radius: var(--radius);
      color: #fff;
      background: #102018;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
      z-index: 20;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    [hidden] { display: none !important; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: .01ms !important;
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }

    @media (max-width: 980px) {
      .topbar { align-items: flex-start; flex-direction: column; padding: 14px; }
      .page { padding: 18px 14px 32px; }
      .hero, .workspace, .service-grid, .handoff-grid, .handoff-actions, .decision-grid { grid-template-columns: 1fr; }
      .side { position: static; max-height: none; }
      .chatbot-dock {
        inset: 12px;
        width: auto;
      }
      .floating-actions {
        right: 14px;
        bottom: 76px;
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="../index.html" aria-label="返回金融服務入口">
      <div class="mark">外部</div>
      <div>
        <strong>對外服務工作台</strong>
      </div>
    </a>
    <div class="top-actions">
      <a class="chip" href="../internal/call-center/index.html" title="前往真人介入與案件交接工作台">Call Center</a>
    </div>
  </header>

  <main class="page">
    <section class="hero">
      <div class="hero-copy">
        <h1>選服務情境，檢查 AI 風險判斷。</h1>
      </div>
      <aside class="panel status-panel" aria-label="服務流程">
        <div class="status-item">
          <strong>選情境</strong>
          <span>先把問題放到正確服務類型，避免用錯規則。</span>
        </div>
        <div class="status-item">
          <strong>看風險</strong>
          <span>涉及個資、交易、盜刷、詐騙時，畫面會先提醒不可詢問的資訊。</span>
        </div>
        <div class="status-item">
          <strong>測試 Chatbot</strong>
          <span>右側面板顯示判斷摘要與測試資料，必要時轉接真人。</span>
        </div>
      </aside>
    </section>

    <section class="workspace">
      <div>
        <div class="section-head">
          <div>
            <h2>選擇服務情境</h2>
          </div>
          <span class="chip">對外版</span>
        </div>
        <div class="service-grid" id="serviceGrid"></div>
      </div>

      <aside class="side">
        <section class="panel">
          <div class="panel-body">
            <span class="badge" id="serviceRisk">一般</span>
            <h2 id="selectedTitle">帳戶登入協助</h2>
            <p id="selectedDesc">客戶無法登入 App，需要確認安全步驟並引導重設。</p>
            <div class="preset-group" aria-label="預設問題">
              <div class="preset-label">選一個 demo 情境</div>
              <div class="preset-options" id="presetOptions"></div>
            </div>
            <label class="field-label" for="replyInput">測試問題</label>
            <textarea id="replyInput" aria-label="測試問題"></textarea>
            <div class="actions">
              <button class="btn primary" id="copyReplyBtn" type="button" title="複製目前測試問題，不包含密碼、OTP、CVV 或完整卡號">複製測試問題</button>
              <button class="btn primary" id="launchBtn" type="button" title="以目前情境、mock data 與測試問題開啟 Dify Chatbot">開啟 Chatbot</button>
              <button class="btn" id="copyPayloadBtn" type="button" title="複製完整 Dify inputs、mock data 與測試問題">複製 Dify 資料</button>
              <button class="btn warning" id="handoffBtn" type="button" title="疑似盜刷、詐騙、身份驗證或帳務個案時轉真人">轉真人處理</button>
            </div>
          </div>
        </section>

        <section class="panel" id="mockProfilePanel">
          <div class="panel-body">
            <h2>Mock 場景資料</h2>
            <p id="mockProfileSummary">依 demo mock data 顯示，不查正式系統。</p>
            <div class="mock-profile-list" id="mockProfileList"></div>
          </div>
        </section>

      </aside>
    </section>
  </main>

  <section class="panel chatbot-dock" id="chatbotPanel" hidden>
    <div class="panel-body">
      <div class="chatbot-panel-head">
        <div>
          <h2>對外 Chatbot</h2>
          <p id="chatbotHint">已依目前服務情境帶入測試資料。</p>
        </div>
        <button class="chatbot-close" id="chatbotCloseBtn" type="button" aria-label="收合 Chatbot">×</button>
      </div>
    </div>
    <div class="chat-frame">
      <iframe
        id="chatbotFrame"
        src="https://dify.startpray.online/chat/T4GRIRNBR7NQKsca"
        style="width: 100%; height: 100%; min-height: 700px"
        frameborder="0"
        allow="microphone; autoplay">
      </iframe>
    </div>
  </section>
  <div class="floating-actions" aria-label="Chatbot 快速操作">
    <a class="floating-chatbot" id="chatbotLink" href="https://dify.startpray.online/chat/T4GRIRNBR7NQKsca" target="_blank" rel="noopener" title="開啟獨立 Chatbot">獨立開啟</a>
    <button class="floating-chatbot" id="floatingChatbotBtn" type="button" aria-controls="chatbotPanel" title="展開對外 Chatbot">開啟 Chatbot</button>
  </div>
  <div class="toast" id="toast" role="status" aria-live="polite">已更新</div>

  <script>

    async function buildChatbotUrl(mode = "chatbot", payload = buildPayload(), sessionId = createChatSessionId()) {
      const params = new URLSearchParams();
      params.set("chat_session_id", sessionId);
      params.set("new_conversation", "1");
      params.set("user", payload.user);
      params.set("query", await encodeDifyInput(payload.query));
      params.set("raw_query", await encodeDifyInput(payload.raw_query));
      for (const [key, value] of Object.entries(payload.inputs)) {
        params.set(key, await encodeDifyInput(typeof value === "boolean" ? String(value) : value));
      }
      return `${CHATBOT_ORIGIN}/${mode}/${CHATBOT_APP_ID}?${params.toString()}`;
    }

        chatbotQr.removeAttribute("src");
        chatbotQr.alt = "Dify URL 過長，請改用獨立開啟或複製 payload";
        return;
      }
      chatbotQr.src = `https://api.qrserver.com/v1/create-qr-code/?size=224x224&data=${encodeURIComponent(chatUrl)}`;
      chatbotQr.alt = "Dify Chatbot QR Code";
    }

    async function syncChatbotEntry({ reloadFrame = false } = {}) {
      const syncSeq = ++chatbotSyncSeq;
      const payload = buildPayload();
      const sessionId = createChatSessionId();
      const chatUrl = await buildChatbotUrl("chat", payload, sessionId);
      const embedUrl = reloadFrame ? await buildChatbotUrl("chatbot", payload, sessionId) : "";
      if (syncSeq !== chatbotSyncSeq) return "";
      chatbotLink.href = chatUrl;
      if (chatbotUrlText) chatbotUrlText.textContent = chatUrl;
      updateQrCode(chatUrl);
      if (reloadFrame) {
        chatbotFrame.src = embedUrl;
      }
      return embedUrl || chatUrl;
    }

    function renderPresets() {
      presetOptions.innerHTML = state.selected.presets.map((preset, index) => `
        <div class="preset-row">
          <button class="preset-option ${state.selectedPresetIndex === index ? "active" : ""}" type="button" data-preset-index="${index}" title="套用這題到回覆草稿，payload 會同步更新">
            ${preset.label}
          </button>
          <button class="preset-copy" type="button" data-copy-index="${index}" title="直接複製這題，不會包含敏感資料">複製</button>
        </div>
      `).join("");

      presetOptions.querySelectorAll(".preset-option").forEach(button => {
        button.addEventListener("click", () => selectPreset(Number(button.dataset.presetIndex)));
      });
      presetOptions.querySelectorAll(".preset-copy").forEach(button => {
        button.addEventListener("click", () => copyPreset(Number(button.dataset.copyIndex)));
      });
    }

    function selectPreset(index) {
      state.selectedPresetIndex = Number.isInteger(index) ? index : 0;
      replyInput.value = state.selected.presets[state.selectedPresetIndex].query;
      renderPresets();
      renderPayload();
    }

    async function copyPreset(index) {
      const preset = state.selected.presets[index] || state.selected.presets[0];
      try {
        await navigator.clipboard.writeText(preset.query);
        showToast(`已複製：${preset.label}`);
      } catch {
        replyInput.value = preset.query;
        state.selectedPresetIndex = index;
        renderPresets();
        renderPayload();
        showToast("瀏覽器未允許直接複製，已套用到輸入框");
      }
    }

    function renderServices() {
      serviceGrid.innerHTML = services.map(item => `
        <article class="service-card ${state.selected.id === item.id ? "active" : ""}" role="button" tabindex="0" data-service="${item.id}">
          <div class="service-visual" aria-hidden="true"></div>
          <div class="service-body">
            <span class="service-icon">${item.icon}</span>
            <div>
              <h3>${item.title}</h3>
              <p>${item.desc}</p>
            </div>
            <a class="faq-link" href="${item.faq}" target="_blank" rel="noopener">查看 FAQ</a>
          </div>
        </article>
      `).join("");

      serviceGrid.querySelectorAll(".service-card").forEach(card => {
        card.addEventListener("click", () => selectService(card.dataset.service, { openChatbot: true }));
        card.addEventListener("keydown", event => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            selectService(card.dataset.service, { openChatbot: true });
          }
        });
      });
      serviceGrid.querySelectorAll(".faq-link").forEach(link => {
        link.addEventListener("click", event => event.stopPropagation());
      });
    }

    function selectService(id, { openChatbot = false } = {}) {
      state.selected = services.find(item => item.id === id) || services[0];
      state.selectedPresetIndex = 0;
      selectedTitle.textContent = state.selected.title;
      selectedDesc.textContent = state.selected.desc;
      serviceRisk.textContent = state.selected.risk;
      serviceRisk.className = badgeClass(state.selected);
      replyInput.value = state.selected.presets[state.selectedPresetIndex].query;
      renderMockProfile();
      renderServices();
      renderPresets();
      renderPayload({ reloadFrame: openChatbot || !chatbotPanel.hidden });
      if (openChatbot) {
        chatbotPanel.hidden = false;
        chatbotHint.textContent = `已切換到 ${state.selected.title}，並建立新的 ${state.selected.business_line} 對話。`;
      }
      showToast(`已切換：${state.selected.title}`);
    }

    function renderPayload(options = {}) {
      renderMockProfile();
      syncChatbotEntry(options);
    }

    function renderHandoff() {
      if (handoffStatus) handoffStatus.textContent = state.handoff.status;
      if (handoffCaseId) handoffCaseId.textContent = state.handoff.caseId;
      if (handoffRequired) handoffRequired.textContent = state.handoff.required;
      if (handoffAgent) handoffAgent.textContent = state.handoff.agent;
      if (handoffNote) handoffNote.value = state.handoff.note;
    }

    function renderMockProfile() {
      const profile = state.selected.mockCustomer;
      if (!profile) {
        mockProfilePanel.hidden = true;
        return;
      }
      mockProfilePanel.hidden = false;
      mockProfileSummary.textContent = profile.customer_profile;
      const rows = [
        ["目前狀態", profile.current_status],
        ["安全下一步", profile.safe_next_steps],
        ["不可索取 / 不可承諾", profile.never_ask]
      ];
      mockProfileList.innerHTML = rows.map(([label, values]) => `
        <div class="mock-profile-item">
          <strong>${label}</strong>
          <span>${values.join("、")}</span>
        </div>
      `).join("");
    }

    function createCaseId() {
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, "0");
      const dd = String(now.getDate()).padStart(2, "0");
      const hh = String(now.getHours()).padStart(2, "0");
      const mi = String(now.getMinutes()).padStart(2, "0");
      return `CASE-${yyyy}${mm}${dd}-${hh}${mi}`;
    }

    async function copyTestQuestion() {
      try {
        await navigator.clipboard.writeText(buildPayload().raw_query);
        showToast("測試問題已複製");
      } catch {
        showToast("瀏覽器未允許複製，請手動選取文字");
      }
    }

    function handoffCase() {
      const isNewCase = state.handoff.caseId === "尚未建立";
      if (isNewCase) {
        state.handoff.caseId = createCaseId();
      }
      if (!isNewCase && state.handoff.status !== "AI 回覆中") {
        renderHandoff();
        showToast(`${state.handoff.caseId} 已在處理中`);
        return;
      }
      state.handoff.status = "已轉真人";
      state.handoff.required = state.selected.riskLevel === "danger" ? "身份驗證、問題類型、可描述狀況" : "問題類型與可描述的狀況";
      state.handoff.agent = "客服將依序接手，請先不要提供敏感資料。";
      if (chatLog) {
        chatLog.insertAdjacentHTML("beforeend", `<div class="message agent">已建立 ${state.handoff.caseId}，我會協助您轉接真人處理。請不要提供 OTP、密碼、CVV 或完整卡號。</div>`);
        chatLog.scrollTop = chatLog.scrollHeight;
      }
      renderHandoff();
      showToast("已轉真人處理");
    }

    function addHandoffNote() {
      if (!handoffNote) return;
      state.handoff.note = handoffNote.value.trim();
      if (!state.handoff.note) {
        showToast("請先輸入補充說明");
        return;
      }
      if (state.handoff.caseId === "尚未建立") {
        state.handoff.caseId = createCaseId();
      }
      state.handoff.status = "等待客服接手";
      state.handoff.agent = "已收到補充說明，客服接手後會接續處理。";
      if (chatLog) {
        chatLog.insertAdjacentHTML("beforeend", `<div class="message">補充說明：${state.handoff.note}</div>`);
        chatLog.scrollTop = chatLog.scrollHeight;
      }
      renderHandoff();
      showToast("已補充案件說明");
    }

    function checkHandoffProgress() {
      if (state.handoff.caseId === "尚未建立") {
        showToast("尚未建立真人介入案件");
        return;
      }
      state.handoff.status = state.handoff.status === "已轉真人" ? "等待客服接手" : "客服處理中";
      state.handoff.agent = state.handoff.status === "客服處理中" ? "真人客服已接手，正在確認資料。" : "案件已排入客服佇列。";
      if (chatLog) {
        chatLog.insertAdjacentHTML("beforeend", `<div class="message agent">${state.handoff.caseId} 目前狀態：${state.handoff.status}</div>`);
        chatLog.scrollTop = chatLog.scrollHeight;
      }
      renderHandoff();
      showToast("案件進度已更新");
    }

    async function launchChatbot() {
      const syncSeq = ++chatbotSyncSeq;
      const payload = buildPayload();
      syncHashParams(payload);
      const sessionId = createChatSessionId();
      const chatUrl = await buildChatbotUrl("chat", payload, sessionId);
      const embedUrl = await buildChatbotUrl("chatbot", payload, sessionId);
      if (syncSeq !== chatbotSyncSeq) return;
      chatbotLink.href = chatUrl;
      if (chatbotUrlText) chatbotUrlText.textContent = chatUrl;
      updateQrCode(chatUrl);
      chatbotFrame.src = embedUrl;
      chatbotHint.textContent = `已帶入 ${payload.inputs.service_id} / ${payload.inputs.route_stage} 與 mock 場景。Dify 會讀取 inputs；第一句測試問題仍需在 Chatbot 送出。`;
      chatbotPanel.hidden = false;
      showToast("已開啟 Chatbot");
    }

    async function copyPayload() {
      try {
        await navigator.clipboard.writeText(JSON.stringify(buildPayload(), null, 2));
        showToast("Dify 測試資料已複製");
      } catch {
        showToast("瀏覽器未允許複製，請手動選取 payload");
      }
    }

    function closeChatbot() {
      chatbotPanel.hidden = true;
      showToast("已收合 Chatbot");
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 2200);
    }

    document.getElementById("copyReplyBtn").addEventListener("click", copyTestQuestion);
    document.getElementById("launchBtn").addEventListener("click", launchChatbot);
    document.getElementById("copyPayloadBtn").addEventListener("click", copyPayload);
    document.getElementById("floatingChatbotBtn").addEventListener("click", launchChatbot);
    document.getElementById("chatbotCloseBtn").addEventListener("click", closeChatbot);
    document.getElementById("handoffBtn").addEventListener("click", handoffCase);
    document.getElementById("handoffCreateBtn")?.addEventListener("click", handoffCase);
    document.getElementById("handoffNoteBtn")?.addEventListener("click", addHandoffNote);
    document.getElementById("handoffProgressBtn")?.addEventListener("click", checkHandoffProgress);
    replyInput.addEventListener("input", renderPayload);
    handoffNote?.addEventListener("input", () => state.handoff.note = handoffNote.value);
    selectService("banking");
    renderHandoff();
  </script>
</body>
</html>
